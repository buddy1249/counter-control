apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: default
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi-container
        image: __IMAGE_NAME__ # Заменяется в GitLab CI на реальный хеш образа
        imagePullPolicy: Always # Всегда скачивать свежий образ, если тег совпал
        ports:
        - containerPort: 8000
        env: # список переменных.
        - name: APP_ENV # Это ключ для функции os.getenv("APP_ENV")
          value: "production" # Это значение которое скроет Swagger в проде.
        
        # Безопасность (Hardening)
        securityContext:
          allowPrivilegeEscalation: false # Запрет повышения прав до root
          runAsNonRoot: true              # Контейнер не запустится от root
          runAsUser: 1000                 # Запуск от имени appuser (UID 1000)
          capabilities:
            drop:
              - ALL                       # Отключение всех опасных системных вызовов

        # Защита ресурсов от перегрузки и ботов
        resources:
          requests:
            cpu: "100m"                   # Гарантированный минимум CPU (0.1 ядра)
            memory: "128Mi"               # Гарантированный минимум RAM
          limits:
            cpu: "500m"                   # Максимальное потребление CPU
            memory: "512Mi"               # При превышении этого порога под перезапустится (OOM)

---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: default
spec:  
  type: ClusterIP 
  selector:
    app: fastapi
  ports:
    - protocol: TCP
      port: 80         # Внешний порт сервиса для ingress
      targetPort: 8000 # Порт внутри FastAPI контейнера
