stages:
  - build
  - deploy

build_job:
  stage: build
  image: docker:latest
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

deploy_job:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
       
  script:
    - export KUBECONFIG=$KUBECONFIG_CONTENT
    - sed -i "s|127.0.0.1|ip-service|g" $KUBECONFIG
    - sed -i "s|__IMAGE_NAME__|$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA|g" k8s-deploy.yaml
    
    # Применяем и деплоймент, и ингресс
    - kubectl apply -f k8s-deploy.yaml --insecure-skip-tls-verify
    - kubectl apply -f ingress.yaml --insecure-skip-tls-verify
    
    - kubectl rollout status deployment/fastapi-app
